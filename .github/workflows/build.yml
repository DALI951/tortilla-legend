name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: TortillaLegend

jobs:
  build-android:
    runs-on: ubuntu-latest
    name: Build Android APK
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Install Android SDK Packages
        run: |
          sdkmanager --install "platforms;android-34" "build-tools;34.0.0"

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          unzip Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Download Export Templates
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATES_DIR"
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          unzip -q Godot_v${GODOT_VERSION}-stable_export_templates.tpz
          mv templates/* "$TEMPLATES_DIR/"

      - name: Install Android Build Template
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q "$TEMPLATES_DIR/android_source.zip" -d android
          echo "${GODOT_VERSION}.stable" > android/.build_version
          echo "=== android/.build_version ==="
          cat android/.build_version

      - name: Configure Editor Settings
        run: |
          mkdir -p ~/.config/godot
          echo "[EditorSettings]" > ~/.config/godot/editor_settings-4.3.tres
          echo "export/android/java_sdk_path = \"/usr/lib/jvm/java-17-openjdk-amd64\"" >> ~/.config/godot/editor_settings-4.3.tres
          echo "=== editor settings ==="
          cat ~/.config/godot/editor_settings-4.3.tres

      - name: Create Keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug,OU=Debug,O=Debug,L=Debug,ST=Debug,C=US"

      - name: Configure Export Presets
        run: |
          KEYPATH="$GITHUB_WORKSPACE/debug.keystore"
          sed -i "s|keystore/debug=\"\"|keystore/debug=\"${KEYPATH}\"|g" export_presets.cfg
          sed -i "s|keystore/debug_user=\"\"|keystore/debug_user=\"androiddebugkey\"|g" export_presets.cfg
          sed -i "s|keystore/debug_password=\"\"|keystore/debug_password=\"android\"|g" export_presets.cfg
          echo "--- export_presets.cfg ---"
          cat export_presets.cfg

      - name: Generate Export Credentials
        run: |
          mkdir -p .godot
          KEYPATH="$GITHUB_WORKSPACE/debug.keystore"
          cat > .godot/export_credentials.cfg << EOF
          [preset.0]
          [preset.0.options]
          keystore/debug="${KEYPATH}"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          EOF
          echo "=== export_credentials.cfg ==="
          cat .godot/export_credentials.cfg

      - name: Pre-heat Godot Cache (editor --quit)
        run: |
          godot --headless --editor --quit 2>&1 || true
          echo "=== .godot after editor ==="
          ls -la .godot/
          ls -la .godot/editor/ 2>/dev/null || true

      - name: Build APK
        run: |
          mkdir -p build
          godot --headless --verbose --export-debug "Android" "build/${EXPORT_NAME}-debug.apk" 2>&1
          echo "=== build/ contents ==="
          ls -la build/

      - name: Get Version
        id: version
        run: |
          VERSION=$(date +'%Y%m%d')-$(echo $GITHUB_SHA | head -c 7)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        with:
          tag_name: "build-${{ steps.version.outputs.version }}"
          name: "Build ${{ steps.version.outputs.version }}"
          files: build/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
