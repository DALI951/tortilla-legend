name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: TortillaLegend

jobs:
  build-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    name: Build Android APK
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          if [ -d /root/.config/godot ]; then
            mv /root/.config/godot ~/.config/godot
          fi
          if [ -d /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ]; then
            mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          fi
          echo "=== SDK path ==="
          echo $ANDROID_HOME
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "no platforms"
          ls /usr/local/lib/android/sdk/ 2>/dev/null || echo "no sdk at /usr/local/lib"
          echo "=== Java ==="
          java -version 2>&1 || echo "no java"
          ls /usr/lib/jvm/ 2>/dev/null || echo "no jvm dir"

      - name: Install Android Build Template
        run: |
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          if [ -f "$TEMPLATES_DIR/android_source.zip" ]; then
            unzip -q "$TEMPLATES_DIR/android_source.zip" -d android
            echo "${GODOT_VERSION}.stable" > android/.build_version
            echo "Build template installed"
            cat android/.build_version
          else
            echo "android_source.zip not found at $TEMPLATES_DIR"
            ls "$TEMPLATES_DIR/" 2>/dev/null || echo "Templates dir not found"
            exit 1
          fi

      - name: Configure Editor Settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/java_sdk_path = "/usr/lib/jvm/java-17-openjdk-amd64"
          export/android/sdk_path = "/usr/local/lib/android/sdk"
          EOF
          echo "=== editor_settings ==="
          cat ~/.config/godot/editor_settings-4.tres

      - name: Use Docker Keystore
        run: |
          echo "Using built-in debug keystore"
          ls -la /root/debug.keystore 2>/dev/null || echo "No default keystore found"

      - name: Configure Export Presets
        run: |
          sed -i 's|keystore/debug=""|keystore/debug="/root/debug.keystore"|g' export_presets.cfg
          sed -i 's|keystore/debug_user=""|keystore/debug_user="androiddebugkey"|g' export_presets.cfg
          sed -i 's|keystore/debug_password=""|keystore/debug_password="android"|g' export_presets.cfg
          echo "--- export_presets.cfg ---"
          cat export_presets.cfg

      - name: Pre-heat Cache
        run: |
          godot --headless --verbose --editor --quit 2>&1 || true
          echo "=== .godot ==="
          ls -la .godot/ 2>/dev/null || true

      - name: Build APK
        run: |
          mkdir -p build
          godot --headless --verbose --export-debug "Android" "build/${EXPORT_NAME}-debug.apk" 2>&1
          echo "=== build/ ==="
          ls -la build/

      - name: Get Version
        id: version
        run: |
          VERSION=$(date +'%Y%m%d')-$(echo $GITHUB_SHA | head -c 7)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-build
          path: build/*.apk
          if-no-files-found: ignore

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        with:
          tag_name: "build-${{ steps.version.outputs.version }}"
          name: "Build ${{ steps.version.outputs.version }}"
          files: build/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
